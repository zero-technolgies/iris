name: Build Iris

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/services/iris/**"
      - "docker/iris/**"

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build:
    name: Build and publish Iris image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/iris"
          short_sha="${GITHUB_SHA::7}"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "tagged_image=${image}:${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Build Docker image
        shell: bash
        run: |
          docker build \
            --platform linux/amd64 \
            --file docker/iris/Dockerfile \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --tag "${{ steps.meta.outputs.tagged_image }}" \
            --tag "${{ steps.meta.outputs.image }}:latest" \
            .

      - name: Check image size
        shell: bash
        run: |
          size_bytes="$(docker image inspect "${{ steps.meta.outputs.tagged_image }}" --format '{{.Size}}')"
          max_bytes="$((20 * 1024 * 1024))"

          echo "Image size: ${size_bytes} bytes"

          if [ "${size_bytes}" -gt "${max_bytes}" ]; then
            echo "Image exceeds 20 MB limit"
            exit 1
          fi

      - name: Push Docker image
        shell: bash
        run: |
          docker push "${{ steps.meta.outputs.tagged_image }}"
          docker push "${{ steps.meta.outputs.image }}:latest"

      - name: Update deploy manifest
        shell: bash
        run: |
          manifest="deploy/applications/iris/manifests/deployment.yaml"
          image="${{ steps.meta.outputs.tagged_image }}"

          IMAGE="${image}" perl -0pi -e 's#^(\s*image: ).*#$1$ENV{IMAGE}#m' "${manifest}"
          git diff -- "${manifest}"

      - name: Commit deploy manifest update
        id: commit
        shell: bash
        run: |
          manifest="deploy/applications/iris/manifests/deployment.yaml"
          branch="ci/update-iris-image"

          if git diff --quiet -- "${manifest}"; then
            echo "Deploy manifest already references ${{ steps.meta.outputs.tagged_image }}"
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch -c "${branch}"
          git add "${manifest}"
          git commit -m "ci(deploy): update Iris image to ${{ steps.meta.outputs.short_sha }} [skip ci]"
          git push --force origin "HEAD:${branch}"

          echo "changed=true" >> "${GITHUB_OUTPUT}"
          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"

      - name: Open or update deploy PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.commit.outputs.branch }}
          IMAGE: ${{ steps.meta.outputs.tagged_image }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        shell: bash
        run: |
          title="ci(deploy): update Iris image to ${SHORT_SHA}"
          body="$(printf 'Updates the Iris Deployment image tag to:\n\n`%s`\n\nThis PR was opened by the Build Iris workflow after publishing the image to GHCR.\n\nRefs: CU-86b9x414r\n' "${IMAGE}")"
          pr_number="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --head "${BRANCH}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "${pr_number}" ]; then
            gh pr edit "${pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body "${body}"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${BRANCH}" \
              --title "${title}" \
              --body "${body}"
          fi
