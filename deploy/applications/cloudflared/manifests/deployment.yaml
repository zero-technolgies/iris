apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: postgres
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: iris
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/part-of: iris
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.6.0
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/cloudflared/config/config.yaml
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: token
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
