apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zero-technolgies/iris.git
    targetRevision: HEAD
    path: deploy/applications
    directory:
      recurse: true
      include: "{root-app.yaml,*/application.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: false
