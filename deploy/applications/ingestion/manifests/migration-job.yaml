apiVersion: batch/v1
kind: Job
metadata:
  name: ingestion-migrate
  namespace: postgres
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: ingestion-migrate
    app.kubernetes.io/part-of: iris
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingestion-migrate
        app.kubernetes.io/part-of: iris
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/zero-technolgies/iris-ingestion-migrate:1c9751d
          imagePullPolicy: IfNotPresent
          args:
            - up
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iris-postgres-app
                  key: uri
            - name: MIGRATIONS_PATH
              value: file:///app/migrations
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
