apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: iris-postgres
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: iris-postgres
    app.kubernetes.io/part-of: iris
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  bootstrap:
    initdb:
      database: iris
      owner: iris
  storage:
    size: 50Gi
    storageClass: local-path-ssd
